services:
  web:
    build:
      context: .
      dockerfile: DockerFile

    container_name: petrotrack_web

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "8000:8000"

    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn petrotrack_backend.wsgi:application
      --bind 0.0.0.0:8000
      --workers 3
      --timeout 120
      "